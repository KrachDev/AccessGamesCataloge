<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGames — كتالوج الألعاب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Rajdhani:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0a0c10;
      --bg2: #111420;
      --bg3: #181c2a;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --new: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #1e2740;
      --card: #13172180;
      --radius: 12px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* animated grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px
    }

    /* HEADER */
    header {
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 12, 16, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .6;
        transform: scale(1.3)
      }
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px
    }

    /* SEARCH */
    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 14px;
      gap: 10px;
      flex: 1;
      max-width: 360px;
      transition: border-color .2s;
    }

    .search-wrap:focus-within {
      border-color: var(--accent)
    }

    .search-wrap svg {
      color: var(--muted);
      flex-shrink: 0;
      width: 16px;
      height: 16px
    }

    #search {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      width: 100%;
      padding: 11px 0;
      direction: rtl;
    }

    #search::placeholder {
      color: var(--muted)
    }

    /* STATS BAR */
    .stats {
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 14px 0;
      font-size: 13px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .stat-val {
      color: var(--accent);
      font-weight: 700;
      font-size: 15px
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 0 16px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .filter-btn.new-filter.active {
      background: var(--new);
      border-color: var(--new);
      color: #000
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      padding-bottom: 60px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      cursor: pointer;
      transition: transform .18s, border-color .18s, box-shadow .18s;
      position: relative;
      overflow: hidden;
      animation: fadeUp .4s both;
      display: flex;
      flex-direction: column;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--bg2);
    }

    .card-content {
      padding: 18px 16px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.04), transparent 60%);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.08);
    }

    .card:hover::before {
      opacity: 1
    }

    .card.new-game {
      border-color: rgba(245, 158, 11, 0.25)
    }

    .card.new-game:hover {
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.1)
    }

    .card.new-game::before {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent 60%)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .badge-new {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--new);
      color: #000;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: .5px;
    }

    .game-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
      padding-left: 0;
    }

    .card.new-game .game-name {
      padding-top: 4px
    }

    /* editions */
    .editions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .edition-tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all .15s;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
    }

    .edition-tag:hover,
    .edition-tag.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, 0.08);
    }

    .card.new-game .edition-tag:hover,
    .card.new-game .edition-tag.selected {
      border-color: var(--new);
      color: var(--new);
      background: rgba(245, 158, 11, 0.08);
    }

    /* price + cta */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .price {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .card.new-game .price {
      color: var(--new)
    }

    .price-label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      line-height: 1
    }

    .wa-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
      text-decoration: none;
    }

    .wa-btn:hover {
      background: #1ebe5d;
      transform: scale(1.04)
    }

    .wa-btn:active {
      transform: scale(.97)
    }

    .wa-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0
    }

    /* EMPTY */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: .4
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      animation: modalIn .2s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.94)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px
    }

    .modal-game {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px
    }

    .modal-edition {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px
    }

    .modal-select-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px
    }

    .modal-editions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px
    }

    .modal-ed-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
    }

    .modal-ed-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px
    }

    .modal-wa {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
    }

    .modal-wa:hover {
      background: #1ebe5d
    }

    .modal-close {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
    }

    .modal-close:hover {
      border-color: var(--muted);
      color: var(--text)
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    /* responsive */
    @media(max-width:600px) {
      .header-inner {
        gap: 12px
      }

      .logo {
        font-size: 20px
      }

      .search-wrap {
        max-width: 100%;
        flex: unset;
        width: 100%
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px
      }

      .card {
        padding: 14px 12px 12px
      }
    }
  </style>
</head>

  </div>

    let currentFilter = 'all';
    let selectedEditions = {};

    function waLink(gameName, edition, price) {
      const msg = `مرحبا، أريد شراء لعبة:\n🎮 ${gameName}\n📦 ${edition} Edition\n💻 ${PLATFORM}\n💰 ${price} درهم`;
      return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
    }

    function buildCard(game, idx) {
      const isHigh = game.tier === 'high';
      const selEd = selectedEditions[game.name] || game.editions[0];
      const selPrice = game.prices[selEd];
      const delay = Math.min(idx * 30, 600);

      const editionBtns = game.editions.map(ed =>
        `<span class="edition-tag${ed === selEd ? ' selected' : ''}" data-game="${game.name}" data-ed="${ed}">${ed} — ${game.prices[ed]}د</span>`
      ).join('');

      const normName = game.name.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '-').trim();
      const imgSrc = `assets/covers/${normName}.webp`;

      return `
  <div class="card${isHigh ? ' new-game' : ''}" data-name="${game.name.toLowerCase()}" data-tier="${game.tier}" data-price="${selPrice}" style="animation-delay:${delay}ms">
    <img src="${imgSrc}" loading="lazy" alt="${game.name}" class="card-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 300 450\\' fill=\\'%23111420\\'%3E%3Crect width=\\'300\\' height=\\'450\\'/%3E%3C/svg%3E'">
    ${isHigh ? '<span class="badge-new">مميز</span>' : ''}
    <div class="card-content">
      <div class="game-name">${game.name}</div>
      <div class="editions">${editionBtns}</div>
      <div class="card-footer">
        <div>
          <span class="price-label">السعر</span>
          <span class="price" id="price-${game.name.replace(/[^a-z0-9]/gi, '_')}">${selPrice} درهم</span>
        </div>
        <a class="wa-btn" href="${waLink(game.name, selEd, selPrice)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

        </a>
      </div>
    </div>
  </div>`;
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const grid = document.getElementById('grid');

      let filtered = CATALOG.filter(g => {
        const matchQ = !q || g.name.toLowerCase().includes(q);
        const basePrice = g.prices[g.editions[0]];
        const matchF =
          currentFilter === 'all' ? true :
            currentFilter === 'new' ? g.tier === 'high' :
              currentFilter === '40' ? basePrice === 40 :
                currentFilter === '60' ? basePrice === 60 : true;
        return matchQ && matchF;
      });

      filtered.sort((a, b) => {
        if (a.tier === 'high' && b.tier !== 'high') return -1;
        if (a.tier !== 'high' && b.tier === 'high') return 1;
        return a.name.localeCompare(b.name);
      });

      document.getElementById('total-count').textContent = filtered.length;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <div>لا توجد نتائج لـ "${q}"</div>
    </div>`;
        return;
      }

      grid.innerHTML = filtered.map((g, i) => buildCard(g, i)).join('');
    }

    // Edition selection
    document.getElementById('grid').addEventListener('click', e => {
      const tag = e.target.closest('.edition-tag');
      if (tag) {
        e.preventDefault();
        e.stopPropagation();
        const gameName = tag.dataset.game;
        const ed = tag.dataset.ed;
        selectedEditions[gameName] = ed;

        // find game data
        const game = CATALOG.find(g => g.name === gameName);
        const price = game.prices[ed];

        // update siblings
        tag.closest('.editions').querySelectorAll('.edition-tag').forEach(t => t.classList.remove('selected'));
        tag.classList.add('selected');

        // update price display
        const card = tag.closest('.card');
        const priceEl = card.querySelector('.price');
        if (priceEl) priceEl.textContent = price + ' درهم';

        // update wa link
        const waBtn = card.querySelector('.wa-btn');
        waBtn.href = waLink(gameName, ed, price);
      }
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', render);

    // Modal
    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    // Initial render
    render();
  </script>
