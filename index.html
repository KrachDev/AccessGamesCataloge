<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGames — كتالوج الألعاب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Rajdhani:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07090f;
      --bg2: #0d1018;
      --bg3: #121620;
      --surface: #161b26;
      --border: #1e2535;
      --border2: #263044;
      --accent: #00d9ff;
      --accent-d: #0099bb;
      --feat: #f59e0b;
      --feat-d: #c97d08;
      --text: #e8edf5;
      --muted: #5a6880;
      --muted2: #8898aa;
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Outfit', 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* subtle noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .7;
    }

    /* faint grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 217, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 217, 255, .025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(7, 9, 15, .88);
      backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #0070ff);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(0, 217, 255, .3);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .brand-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .5px;
    }

    .brand-text span {
      color: var(--accent);
    }

    .header-search {
      flex: 1;
      min-width: 200px;
      max-width: 440px;
      position: relative;
    }

    .header-search svg {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
      transition: color .2s;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      padding: 10px 42px 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      direction: rtl;
    }

    #search::placeholder {
      color: var(--muted);
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 217, 255, .1);
    }

    #search:focus~svg {
      color: var(--accent);
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px 10px 0;
      white-space: nowrap;
      font-size: 13px;
      color: var(--muted2);
    }

    .stat-item:not(:last-child) {
      margin-left: 24px;
      border-left: 1px solid var(--border);
      padding-left: 24px;
    }

    .stat-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-num.cyan {
      color: var(--accent);
    }

    .stat-num.amber {
      color: var(--feat);
    }

    /* ── FILTERS ── */
    .filters-bar {
      display: flex;
      gap: 8px;
      padding: 14px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .pill.feat-pill.active {
      background: var(--feat);
      border-color: var(--feat);
      color: #000;
    }

    /* ── RESULTS LABEL ── */
    .results-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .results-row strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
      padding-bottom: 80px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: default;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: fadeUp .4s both;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 217, 255, .35);
      box-shadow: 0 12px 40px rgba(0, 217, 255, .07), 0 4px 12px rgba(0, 0, 0, .4);
    }

    .card.feat {
      border-color: rgba(245, 158, 11, .2);
    }

    .card.feat:hover {
      border-color: rgba(245, 158, 11, .5);
      box-shadow: 0 12px 40px rgba(245, 158, 11, .08), 0 4px 12px rgba(0, 0, 0, .4);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* cover */
    .card-cover {
      position: relative;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      background: var(--bg3);
      flex-shrink: 0;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s;
    }

    .card:hover .card-cover img {
      transform: scale(1.04);
    }

    .cover-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          transparent 40%,
          rgba(7, 9, 15, .6) 70%,
          rgba(7, 9, 15, .95) 100%);
    }

    /* badge */
    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .6px;
      padding: 3px 9px;
      border-radius: 5px;
      text-transform: uppercase;
    }

    .badge-feat {
      background: var(--feat);
      color: #000;
    }

    /* card body */
    .card-body {
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 10px;
    }

    .game-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      direction: ltr;
      text-align: right;
    }

    /* editions */
    .editions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .ed-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      color: var(--muted2);
      cursor: pointer;
      transition: all .15s;
      direction: ltr;
    }

    .ed-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .ed-tag.sel {
      background: rgba(0, 217, 255, .12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .card.feat .ed-tag:hover {
      border-color: var(--feat);
      color: var(--feat);
    }

    .card.feat .ed-tag.sel {
      background: rgba(245, 158, 11, .1);
      border-color: var(--feat);
      color: var(--feat);
    }

    /* footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: auto;
    }

    .price-wrap {}

    .price-label {
      font-size: 10px;
      color: var(--muted);
      display: block;
      margin-bottom: 1px;
      font-family: 'Tajawal', sans-serif;
    }

    .price {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }

    .card.feat .price {
      color: var(--feat);
    }

    .wa-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1db954;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 13px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, transform .1s, box-shadow .15s;
      white-space: nowrap;
    }

    .wa-btn:hover {
      background: #1ed760;
      transform: scale(1.04);
      box-shadow: 0 4px 14px rgba(29, 185, 84, .35);
    }

    .wa-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* cover placeholder */
    .cover-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      color: var(--border2);
    }

    .cover-ph svg {
      width: 40px;
      height: 40px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty svg {
      width: 52px;
      height: 52px;
      opacity: .3;
    }

    .empty h3 {
      font-size: 16px;
      color: var(--muted2);
      font-weight: 600;
    }

    /* ── LOADING ── */
    .loader {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .wrap {
        padding: 0 14px;
      }

      .brand-text {
        font-size: 18px;
      }

      .header-search {
        max-width: 100%;
        min-width: 0;
        flex: 1 1 100%;
        order: 3;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 11px;
      }

      .stat-item {
        padding: 8px 14px 8px 0;
      }

      .stat-item:not(:last-child) {
        margin-left: 14px;
        padding-left: 14px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="wrap">
      <div class="header-row">
        <a class="brand" href="#">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="3" />
              <path d="M8 12h2m1-1v2M17 12h.01M14 12h.01" />
            </svg>
          </div>
          <div class="brand-text">Access<span>Games</span></div>
        </a>

        <div class="header-search">
          <input type="text" id="search" placeholder="ابحث عن لعبة..." autocomplete="off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </div>
      </div>

      <div class="stats-strip">
        <div class="stat-item">
          <span class="stat-num cyan" id="total-count">—</span>
          <span>لعبة متاحة</span>
        </div>
        <div class="stat-item">
          <span class="stat-num cyan">40</span>
          <span>درهم — الألعاب العادية</span>
        </div>
        <div class="stat-item">
          <span class="stat-num amber">60</span>
          <span>درهم — المميزة</span>
        </div>
        <div class="stat-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="color:var(--accent)">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          <span>تفعيل أوفلاين فوري</span>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="filters-bar">
      <span class="filters-label">تصفية</span>
      <button class="pill active" data-f="all">الكل</button>
      <button class="pill feat-pill" data-f="feat">⭐ مميزة</button>
      <button class="pill" data-f="40">40 د</button>
      <button class="pill" data-f="60">60 د</button>
    </div>

    <div class="results-row">
      <span id="results-label"></span>
    </div>

    <div class="grid" id="grid">
      <div class="loader">
        <div class="spinner"></div>
        <span>جاري تحميل الكتالوج…</span>
      </div>
    </div>
  </div>

  <script>
    const WA = '212659978011';
    const PLATFORM = 'PC (Offline)';

    let CATALOG = [];
    let filter = 'all';
    let selEditions = {};

    function slugify(n) {
      return n.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '-').trim();
    }

    function waHref(name, ed, price) {
      const msg = `مرحبا، أريد شراء لعبة:\n🎮 ${name}\n📦 ${ed} Edition\n💻 ${PLATFORM}\n💰 ${price} درهم`;
      return `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
    }

    function buildCard(game, idx) {
      const isFeat = game.tier === 'high';
      const selEd = selEditions[game.name] || game.editions[0];
      const price = game.prices[selEd];
      const delay = Math.min(idx * 25, 500);
      const slug = slugify(game.name);
      const safeId = game.name.replace(/[^a-z0-9]/gi, '_');

      const edBtns = game.editions.map(ed =>
        `<span class="ed-tag${ed === selEd ? ' sel' : ''}" data-game="${game.name}" data-ed="${ed}" title="${ed} — ${game.prices[ed]}د">${ed}</span>`
      ).join('');

      return `
      <div class="card${isFeat ? ' feat' : ''}" style="animation-delay:${delay}ms">
        <div class="card-cover">
          <img src="assets/covers/${slug}.webp" loading="lazy" alt="${game.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="cover-ph" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="6" width="20" height="12" rx="3"/>
              <path d="M8 12h2m1-1v2M17 12h.01M14 12h.01"/>
            </svg>
          </div>
          <div class="cover-gradient"></div>
          ${isFeat ? '<span class="badge badge-feat">مميز</span>' : ''}
        </div>
        <div class="card-body">
          <div class="game-title">${game.name}</div>
          <div class="editions">${edBtns}</div>
          <div class="card-footer">
            <div class="price-wrap">
              <span class="price-label">السعر</span>
              <span class="price" id="p_${safeId}">${price} <small style="font-size:13px;font-weight:500">د</small></span>
            </div>
            <a class="wa-btn" id="wa_${safeId}" href="${waHref(game.name, selEd, price)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              اطلب
            </a>
          </div>
        </div>
      </div>`;
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const grid = document.getElementById('grid');

      let list = CATALOG.filter(g => {
        const matchQ = !q || g.name.toLowerCase().includes(q);
        const base = g.prices[g.editions[0]];
        const matchF =
          filter === 'all' ? true :
            filter === 'feat' ? g.tier === 'high' :
              filter === '40' ? base === 40 :
                filter === '60' ? base === 60 : true;
        return matchQ && matchF;
      });

      list.sort((a, b) => {
        if (a.tier === 'high' && b.tier !== 'high') return -1;
        if (a.tier !== 'high' && b.tier === 'high') return 1;
        return a.name.localeCompare(b.name);
      });

      document.getElementById('total-count').textContent = list.length;

      const lbl = document.getElementById('results-label');
      lbl.innerHTML = q
        ? `عرض <strong>${list.length}</strong> نتيجة لـ "<strong>${q}</strong>"`
        : `<strong>${list.length}</strong> لعبة`;

      if (!list.length) {
        grid.innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <h3>لا توجد نتائج</h3>
          <span>جرب كلمة أخرى أو غيّر الفلتر</span>
        </div>`;
        return;
      }

      grid.innerHTML = list.map((g, i) => buildCard(g, i)).join('');
    }

    // Edition click delegation
    document.getElementById('grid').addEventListener('click', e => {
      const tag = e.target.closest('.ed-tag');
      if (!tag) return;
      e.preventDefault(); e.stopPropagation();
      const gname = tag.dataset.game;
      const ed = tag.dataset.ed;
      const game = CATALOG.find(g => g.name === gname);
      const price = game.prices[ed];
      const safeId = gname.replace(/[^a-z0-9]/gi, '_');
      selEditions[gname] = ed;

      tag.closest('.editions').querySelectorAll('.ed-tag').forEach(t => t.classList.remove('sel'));
      tag.classList.add('sel');

      const priceEl = document.getElementById('p_' + safeId);
      if (priceEl) priceEl.innerHTML = `${price} <small style="font-size:13px;font-weight:500">د</small>`;

      const waEl = document.getElementById('wa_' + safeId);
      if (waEl) waEl.href = waHref(gname, ed, price);
    });

    // Filters
    document.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.f;
        render();
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', render);

    // Load CSV
    fetch('games.csv')
      .then(r => r.text())
      .then(csv => {
        const lines = csv.split(/\r?\n/).filter(l => l.trim() !== '');
        CATALOG = [];
        // Skip header line (i = 1)
        for (let i = 1; i < lines.length; i++) {
          const parts = lines[i].split(',');
          if (parts.length >= 3) {
            const name = parts[0].trim();
            const price = parseInt(parts[1].trim(), 10) || 0;
            const tag = parts[2].trim();

            CATALOG.push({
              name: name,
              editions: ['Standard'],
              prices: { 'Standard': price },
              tier: (tag.includes('NEW') || price === 60) ? 'high' : 'normal'
            });
          }
        }
        render();
      })
      .catch(err => {
        console.error("Error loading CSV:", err);
        document.getElementById('grid').innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
          </svg>
          <h3>تعذّر تحميل الكتالوج</h3>
          <span>تأكد من وجود ملف games.csv</span>
        </div>`;
      });
  </script>
</body>

</html>
