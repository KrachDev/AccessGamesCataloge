<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGames — كتالوج الألعاب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Rajdhani:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #030408;
      --bg2: #080a10;
      --bg3: #0c0f18;
      --surface: #10141f;
      --border: rgba(255, 255, 255, 0.1);
      --border2: rgba(255, 255, 255, 0.15);
      --accent: #ff0044;
      --accent-d: #cc0036;
      --feat: #f59e0b;
      --feat-d: #c97d08;
      --text: #ffffff;
      --muted: #a0a5b5;
      --muted2: #d1d5db;
      --radius: 12px;
      --radius-lg: 18px;
    }

    body {
      font-family: 'Outfit', 'Tajawal', sans-serif;
      background: radial-gradient(circle at top, #1a0810 0%, #030408 60%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* glowing embers and noise */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255, 60, 0, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 60, 0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(7, 9, 15, .88);
      backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #ff4d79);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(255, 0, 68, .4);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .brand-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .5px;
    }

    .brand-text span {
      color: var(--accent);
    }

    .header-search {
      flex: 1;
      min-width: 200px;
      max-width: 440px;
      position: relative;
    }

    .header-search svg {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
      transition: color .2s;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      padding: 10px 42px 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      direction: rtl;
    }

    #search::placeholder {
      color: var(--muted);
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 0, 68, .15);
    }

    #search:focus~svg {
      color: var(--accent);
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px 10px 0;
      white-space: nowrap;
      font-size: 13px;
      color: var(--muted2);
    }

    .stat-item:not(:last-child) {
      margin-left: 24px;
      border-left: 1px solid var(--border);
      padding-left: 24px;
    }

    .stat-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-num.cyan {
      color: var(--accent);
    }

    .stat-num.amber {
      color: var(--feat);
    }

    /* ── FILTERS ── */
    .filters-bar {
      display: flex;
      gap: 8px;
      padding: 14px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .pill.feat-pill.active {
      background: var(--feat);
      border-color: var(--feat);
      color: #000;
    }

    /* ── RESULTS LABEL ── */
    .results-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .results-row strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── GRID & SECTIONS ── */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
      padding-bottom: 80px;
    }

    .catalog-sections {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-bottom: 80px;
    }

    .section-title {
      font-family: 'Rajdhani', 'Tajawal', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      direction: rtl;
    }

    .section-title::before {
      content: '';
      width: 5px;
      height: 20px;
      background: var(--accent);
      border-radius: 4px;
    }

    .scroller-wrap {
      position: relative;
    }

    .scroller {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      direction: rtl;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 40px, black calc(100% - 40px), transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 40px, black calc(100% - 40px), transparent 100%);
    }

    .scroller::-webkit-scrollbar {
      display: none;
    }

    .scroller .card {
      min-width: 210px;
      max-width: 210px;
      scroll-snap-align: start;
    }

    .scroll-btn {
      position: absolute;
      top: calc(50% - 6px);
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(10, 10, 15, 0.7);
      border: 1px solid var(--border2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all .2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .scroll-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(255, 0, 68, 0.5);
    }

    .scroll-btn.next-btn {
      left: -12px;
    }

    .scroll-btn.prev-btn {
      right: -12px;
    }

    /* ── CARD ── */
    .card {
      background: #000;
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: default;
      transition: transform .3s, border-color .3s, box-shadow .3s;
      animation: fadeUp .4s both;
      display: flex;
      flex-direction: column;
      position: relative;
      aspect-ratio: 2 / 3;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 0, 68, .4);
      box-shadow: 0 12px 40px rgba(255, 0, 68, .15), 0 4px 12px rgba(0, 0, 0, .5);
    }

    .card.feat {
      border-color: rgba(245, 158, 11, .3);
      box-shadow: 0 0 15px rgba(245, 158, 11, .1);
    }

    .card.feat:hover {
      border-color: rgba(245, 158, 11, .6);
      box-shadow: 0 12px 40px rgba(245, 158, 11, .2), 0 4px 12px rgba(0, 0, 0, .5);
    }

    .card.combo-card {
      border-color: rgba(0, 217, 255, .4);
      box-shadow: 0 0 15px rgba(0, 217, 255, .15), inset 0 0 20px rgba(122, 0, 255, .1);
    }

    .card.combo-card:hover {
      border-color: #00d9ff;
      box-shadow: 0 12px 40px rgba(0, 217, 255, .3), 0 4px 12px rgba(0, 0, 0, .5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* cover */
    .card-cover {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: var(--bg3);
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .card:hover .card-cover img {
      transform: scale(1.05);
    }

    .cover-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          transparent 30%,
          rgba(0, 0, 0, .5) 65%,
          rgba(0, 0, 0, .95) 100%);
      pointer-events: none;
    }

    /* badge */
    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 4;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .8px;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
    }

    .badge-feat {
      background: var(--feat);
      color: #000;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.6);
      right: 12px;
      left: auto;
    }

    .badge-combo {
      background: rgba(15, 15, 20, 0.8);
      backdrop-filter: blur(4px);
      color: #00d9ff;
      border: 1px solid #00d9ff;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
      left: 12px;
    }

    .combo-games-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--muted2);
      direction: ltr;
      text-align: left;
      padding-top: 4px;
      border-top: 1px dashed rgba(255,255,255,0.1);
      max-height: 70px;
      overflow-y: auto;
    }

    .combo-item {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* card body - glassmorphism & neon borders */
    .card-body {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      z-index: 3;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(10, 10, 15, 0.45);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      border-radius: 12px;
      border-top: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 -4px 12px rgba(255, 0, 68, 0.25), 0 4px 12px rgba(255, 0, 68, 0.25);
    }

    .game-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      direction: ltr;
      text-align: left;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* editions */
    .editions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .ed-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--muted2);
      background: rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all .2s;
      direction: ltr;
    }

    .ed-tag:hover {
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 8px rgba(255, 0, 68, 0.4);
    }

    .ed-tag.sel {
      background: rgba(255, 0, 68, 0.15);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 10px rgba(255, 0, 68, 0.4);
    }

    /* footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 2px;
    }

    .price-wrap {
      display: flex;
      flex-direction: column;
    }

    .price-label {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      display: block;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Tajawal', sans-serif;
    }

    .price {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    
    .price small {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      margin-left: 2px;
      text-shadow: 0 0 8px rgba(255, 0, 68, 0.5);
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #1db954;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s, background .15s;
      white-space: nowrap;
      box-shadow: 0 0 10px rgba(29, 185, 84, 0.3);
    }

    .wa-btn:hover {
      background: #1ed760;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(29, 185, 84, 0.5);
    }

    .wa-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* cover placeholder */
    .cover-ph {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      color: var(--border2);
    }

    .cover-ph svg {
      width: 40px;
      height: 40px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty svg {
      width: 52px;
      height: 52px;
      opacity: .3;
    }

    .empty h3 {
      font-size: 16px;
      color: var(--muted2);
      font-weight: 600;
    }

    /* ── LOADING ── */
    .loader {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── CONTACT BANNER ── */
    .contact-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-top: 40px;
      margin-bottom: 80px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 0, 68, 0.1);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 24px;
      height: 24px;
    }

    .contact-text {
      flex: 1;
    }

    .contact-text h4 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .contact-text p {
      font-size: 14px;
      color: var(--muted);
    }

    .contact-btn {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .contact-btn:hover {
      background: var(--accent-d);
      box-shadow: 0 4px 15px rgba(255,0,68,0.4);
    }

    .contact-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .wrap {
        padding: 0 14px;
      }

      .brand-text {
        font-size: 18px;
      }

      .header-search {
        max-width: 100%;
        min-width: 0;
        flex: 1 1 100%;
        order: 3;
      }

      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 11px;
      }

      .scroller-wrap {
        margin: 0 -14px;
      }

      .scroller {
        padding: 0 14px 12px;
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 14px, black calc(100% - 14px), transparent 100%);
        mask-image: linear-gradient(to right, transparent 0%, black 14px, black calc(100% - 14px), transparent 100%);
      }

      .scroller .card {
        min-width: 160px;
        max-width: 160px;
      }

      .scroll-btn {
        display: none;
      }

      .stat-item {
        padding: 8px 14px 8px 0;
      }

      .stat-item:not(:last-child) {
        margin-left: 14px;
        padding-left: 14px;
      }

      .contact-banner {
        flex-direction: column;
        text-align: center;
        padding: 20px;
        gap: 16px;
      }

      .contact-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="wrap">
      <div class="header-row">
        <a class="brand" href="#">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="3" />
              <path d="M8 12h2m1-1v2M17 12h.01M14 12h.01" />
            </svg>
          </div>
          <div class="brand-text">Access<span>Games</span></div>
        </a>

        <div class="header-search">
          <input type="text" id="search" placeholder="ابحث عن لعبة..." autocomplete="off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </div>
      </div>

      <div class="stats-strip">
        <div class="stat-item">
          <span class="stat-num cyan" id="total-count">—</span>
          <span>لعبة متاحة</span>
        </div>
        <div class="stat-item">
          <span class="stat-num cyan">40</span>
          <span>درهم — الألعاب العادية</span>
        </div>
        <div class="stat-item">
          <span class="stat-num amber">60</span>
          <span>درهم — المميزة</span>
        </div>
        <div class="stat-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="color:var(--accent)">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          <span>تفعيل أوفلاين فوري</span>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="filters-bar">
      <span class="filters-label">تصفية</span>
      <button class="pill active" data-f="all">الكل</button>
      <button class="pill feat-pill" data-f="feat">⭐ مميزة</button>
      <button class="pill" data-f="40">40 د.م</button>
      <button class="pill" data-f="60">60 د.م</button>
      <button class="pill" data-f="combo">مجموعات</button>
      <button class="pill" data-f="single">فردية</button>
    </div>

    <div class="results-row">
      <span id="results-label"></span>
    </div>

    <div class="grid" id="grid">
      <div class="loader">
        <div class="spinner"></div>
        <span>جاري تحميل الكتالوج…</span>
      </div>
    </div>

    <div class="contact-banner">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <div class="contact-text">
        <h4>لم تجد اللعبة التي تبحث عنها؟</h4>
        <p>تواصل معنا وسنقوم بتوفيرها لك بأفضل سعر!</p>
      </div>
      <a class="contact-btn" href="https://wa.me/212659978011?text=%D9%85%D8%B1%D8%AD%D8%A8%D8%A7%D8%8C%20%D8%A3%D8%A8%D8%AD%D8%AB%20%D8%B9%D9%86%20%D9%84%D8%B9%D8%A8%D8%A9%20%D8%BA%D9%8A%D8%B1%20%D9%85%D9%88%D8%AC%D9%88%D8%AF%D8%A9%20%D9%81%D9%8A%20%D8%A7%D9%84%D9%83%D8%AA%D8%A7%D9%84%D9%88%D8%AC%3A" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        تواصل معنا
      </a>
    </div>
  </div>

  <script>
    const WA = '212659978011';
    const PLATFORM = 'PC (Offline)';

    let CATALOG = [];
    let filter = 'all';
    let selEditions = {};

    function slugify(n) {
      return n.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '-').trim();
    }

    function waHref(name, ed, price) {
      const msg = `مرحبا، أريد شراء لعبة:\n🎮 ${name}\n📦 ${ed} Edition\n💻 ${PLATFORM}\n💰 ${price} درهم`;
      return `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
    }

    function buildComboGameCard(game, idx) {
      const isFeat = game.tier === 'high';
      const selEd = selEditions[game.name] || game.editions[0];
      const price = game.prices[selEd];
      const delay = Math.min(idx * 25, 500);
      const slug = slugify(game.name);
      const safeId = game.name.replace(/[^a-z0-9]/gi, '_');

      const edBtns = game.editions.map(ed =>
        `<span class="ed-tag${ed === selEd ? ' sel' : ''}" data-game="${game.name}" data-ed="${ed}" title="${ed} — ${game.prices[ed]}د.م">${ed}</span>`
      ).join('');

      let gamesListHtml = '';
      let coverHtml = '';
      const placeholder = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.2)' stroke-width='1.5'%3E%3Crect x='2' y='6' width='20' height='12' rx='3'/%3E%3Cpath d='M8 12h2m1-1v2M17 12h.01M14 12h.01'/%3E%3C/svg%3E";

      if (game.combo_list && game.combo_list.length > 0) {
        gamesListHtml = `<div class="combo-games-list">
          ${game.combo_list.map(g => `<div class="combo-item">• ${g}</div>`).join('')}
        </div>`;
        
        const coverGames = game.combo_list.slice(0, 3);
        const colWidth = 100 / coverGames.length;
        
        const imgs = coverGames.map((g, i) => {
          const cSlug = slugify(g);
          const borderStyle = i > 0 ? 'border-right: 1px solid rgba(255,255,255,0.15);' : '';
          return `<img src="assets/covers/${cSlug}.webp" loading="lazy" alt="${g}" style="width: ${colWidth}%; height: 100%; object-fit: cover; ${borderStyle}" onerror="this.src='${placeholder}'; this.onerror=null; this.style.objectFit='contain'; this.style.padding='20px';">`;
        }).join('');
        
        coverHtml = `<div style="display: flex; width: 100%; height: 100%; flex-direction: row-reverse;">${imgs}</div>`;
      } else {
        coverHtml = `<img src="assets/covers/${slug}.webp" loading="lazy" alt="${game.name}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='${placeholder}'; this.onerror=null; this.style.objectFit='contain'; this.style.padding='40px';">`;
      }

      return `
      <div class="card combo-card${isFeat ? ' feat' : ''}" style="animation-delay:${delay}ms">
        <div class="card-cover">
          ${coverHtml}
          <div class="cover-gradient"></div>
        </div>
        ${isFeat ? '<span class="badge badge-feat">مميز</span>' : ''}
        <span class="badge badge-combo">مجموعة ألعاب</span>
        <div class="card-body">
          <div class="game-title">${game.name}</div>
          ${gamesListHtml}
          <div class="card-footer">
            <div class="price-wrap">
              <span class="price-label">السعر</span>
              <span class="price" id="p_${safeId}">${price}<small>د.م</small></span>
            </div>
            <a class="wa-btn" id="wa_${safeId}" href="${waHref(game.name, selEd, price)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              اطلب
            </a>
          </div>
        </div>
      </div>`;
    }

    function buildCard(game, idx) {
      const isFeat = game.tier === 'high';
      const selEd = selEditions[game.name] || game.editions[0];
      const price = game.prices[selEd];
      const delay = Math.min(idx * 25, 500);
      const slug = slugify(game.name);
      const safeId = game.name.replace(/[^a-z0-9]/gi, '_');

      const edBtns = game.editions.map(ed =>
        `<span class="ed-tag${ed === selEd ? ' sel' : ''}" data-game="${game.name}" data-ed="${ed}" title="${ed} — ${game.prices[ed]}د.م">${ed}</span>`
      ).join('');

      return `
      <div class="card${isFeat ? ' feat' : ''}" style="animation-delay:${delay}ms">
        <div class="card-cover">
          <img src="assets/covers/${slug}.webp" loading="lazy" alt="${game.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="cover-ph" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="6" width="20" height="12" rx="3"/>
              <path d="M8 12h2m1-1v2M17 12h.01M14 12h.01"/>
            </svg>
          </div>
          <div class="cover-gradient"></div>
        </div>
        ${isFeat ? '<span class="badge badge-feat">مميز</span>' : ''}
        <div class="card-body">
          <div class="game-title">${game.name}</div>
          <div class="editions">${edBtns}</div>
          <div class="card-footer">
            <div class="price-wrap">
              <span class="price-label">السعر</span>
              <span class="price" id="p_${safeId}">${price}<small>د.م</small></span>
            </div>
            <a class="wa-btn" id="wa_${safeId}" href="${waHref(game.name, selEd, price)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              اطلب
            </a>
          </div>
        </div>
      </div>`;
    }

    function scrollRow(btn, dir) {
      const scroller = btn.parentElement.querySelector('.scroller');
      const amount = dir * 600;
      scroller.scrollBy({ left: -amount, behavior: 'smooth' });
    }

    function buildSection(title, games, isScroller) {
      if (!games.length) return '';
      const cardsHtml = games.map((g, i) => g.is_combo ? buildComboGameCard(g, i) : buildCard(g, i)).join('');
      
      if (isScroller) {
        return `
          <div class="section">
            <div class="section-title">${title}</div>
            <div class="scroller-wrap">
              <button class="scroll-btn prev-btn" onclick="scrollRow(this, -1)" aria-label="السابق">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
              <div class="scroller">
                ${cardsHtml}
              </div>
              <button class="scroll-btn next-btn" onclick="scrollRow(this, 1)" aria-label="التالي">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
            </div>
          </div>
        `;
      } else {
        return `
          <div class="section">
            <div class="section-title">${title}</div>
            <div class="grid-container">
              ${cardsHtml}
            </div>
          </div>
        `;
      }
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const grid = document.getElementById('grid');

      let list = CATALOG.filter(g => {
        const matchQ = !q || g.name.toLowerCase().includes(q);
        const base = g.prices[g.editions[0]];
        const matchF =
          filter === 'all' ? true :
            filter === 'feat' ? g.tier === 'high' :
              filter === '40' ? base === 40 :
                filter === '60' ? base === 60 : 
                  filter === 'combo' ? g.is_combo :
                    filter === 'single' ? !g.is_combo : true;
        return matchQ && matchF;
      });

      list.sort((a, b) => {
        if (a.tier === 'high' && b.tier !== 'high') return -1;
        if (a.tier !== 'high' && b.tier === 'high') return 1;
        return a.name.localeCompare(b.name);
      });

      document.getElementById('total-count').textContent = list.length;

      const lbl = document.getElementById('results-label');
      lbl.innerHTML = q
        ? `عرض <strong>${list.length}</strong> نتيجة لـ "<strong>${q}</strong>"`
        : `<strong>${list.length}</strong> لعبة`;

      if (!list.length) {
        grid.className = 'grid-container';
        grid.innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <h3>لا توجد نتائج</h3>
          <span>جرب كلمة أخرى أو غيّر الفلتر</span>
        </div>`;
        return;
      }

      if (filter === 'all' && q === '') {
        let html = '';
        const newGames = list.filter(g => g.tag && g.tag.includes('NEW'));
        if (newGames.length) html += buildSection('🔥 أحدث الإصدارات', newGames, true);

        const newNames = new Set(newGames.map(g => g.name));
        const featGames = list.filter(g => g.tier === 'high' && !newNames.has(g.name));
        if (featGames.length) html += buildSection('⭐ ألعاب مميزة', featGames, true);

        const comboAll = list.filter(g => g.is_combo);
        if (comboAll.length) html += buildSection('📦 مجموعات التوفير', comboAll, true);

        const shownNames = new Set([...newGames, ...featGames, ...comboAll].map(g => g.name));
        const restGames = list.filter(g => !shownNames.has(g.name));
        if (restGames.length) html += buildSection('🎮 تصفح الكتالوج', restGames, false);

        grid.className = 'catalog-sections';
        grid.innerHTML = html;
      } else {
        grid.className = 'grid-container';
        grid.innerHTML = list.map((g, i) => g.is_combo ? buildComboGameCard(g, i) : buildCard(g, i)).join('');
      }
    }

    // Edition click delegation
    document.getElementById('grid').addEventListener('click', e => {
      const tag = e.target.closest('.ed-tag');
      if (!tag) return;
      e.preventDefault(); e.stopPropagation();
      const gname = tag.dataset.game;
      const ed = tag.dataset.ed;
      const game = CATALOG.find(g => g.name === gname);
      const price = game.prices[ed];
      const safeId = gname.replace(/[^a-z0-9]/gi, '_');
      selEditions[gname] = ed;

      tag.closest('.editions').querySelectorAll('.ed-tag').forEach(t => t.classList.remove('sel'));
      tag.classList.add('sel');

      const priceEl = document.getElementById('p_' + safeId);
      if (priceEl) priceEl.innerHTML = `${price}<small>د.م</small>`;

      const waEl = document.getElementById('wa_' + safeId);
      if (waEl) waEl.href = waHref(gname, ed, price);
    });

    // Filters
    document.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.f;
        render();
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', render);

    function parseCSVLine(line) {
      const result = [];
      let cur = '';
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur);
      return result;
    }

    // Load CSV
    fetch('games.csv?' + Date.now())
      .then(r => r.text())
      .then(csv => {
        const lines = csv.split(/\r?\n/).filter(l => l.trim() !== '');
        CATALOG = [];
        // Skip header line (i = 1)
        for (let i = 1; i < lines.length; i++) {
          const parts = parseCSVLine(lines[i]);
          if (parts.length >= 3) {
            const name = parts[0].trim();
            const price = parseInt(parts[1].trim(), 10) || 0;
            const tag = parts[2].trim();
            const has_deluxe = parts[3] ? parts[3].trim() === 'True' : false;
            const is_combo = parts[4] ? parts[4].trim() === 'True' : false;
            const combo_list = parts[5] ? parts[5].trim() : '';
            const deluxe_price = parts[6] ? parseInt(parts[6].trim(), 10) : 0;

            const editions = ['Standard'];
            const prices = { 'Standard': price };
            if (has_deluxe) {
              editions.push('Deluxe');
              prices['Deluxe'] = deluxe_price || (price + 10);
            }

            CATALOG.push({
              name: name,
              editions: editions,
              prices: prices,
              tier: (tag.includes('NEW') || price === 60) ? 'high' : 'normal',
              is_combo: is_combo,
              tag: tag,
              combo_list: combo_list.split('|').map(s => s.trim()).filter(s => s)
            });
          }
        }
        render();
      })
      .catch(err => {
        console.error("Error loading CSV:", err);
        document.getElementById('grid').innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
          </svg>
          <h3>تعذّر تحميل الكتالوج</h3>
          <span>تأكد من وجود ملف games.csv</span>
        </div>`;
      });
  </script>
</body>

</html>
